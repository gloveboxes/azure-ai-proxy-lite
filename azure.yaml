# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: aoai-proxy
services:
  proxy:
    project: ./src/AzureAIProxy
    language: csharp
    host: containerapp
    docker:
      path: ../Dockerfile.proxy
      context: ../
      platform: amd64

  admin:
    project: ./src/AzureAIProxy.Admin
    language: csharp
    host: containerapp
    docker:
      path: ../Dockerfile.admin
      context: ../
      platform: amd64

  registration:
    project: ./src/registration
    language: ts
    host: staticwebapp
    dist: dist

hooks:
  preprovision:
    shell: sh
    continueOnError: false
    interactive: true
    run: |
      infra/scripts/ensure-encryption-key.sh
      infra/scripts/setup-app-registration.sh

  postprovision:
    shell: sh
    continueOnError: true
    interactive: true
    run: infra/scripts/setup-app-redirect-uris.sh

  postup:
    shell: sh
    continueOnError: true
    interactive: true
    run: |
      echo ""
      echo "============================================="
      echo "  Deployment Complete!"
      echo "============================================="
      echo ""
      echo "Endpoints:"
      echo "  Proxy API:     $(azd env get-value SERVICE_PROXY_URI)"
      echo "  Admin UI:      $(azd env get-value SERVICE_ADMIN_URI)"
      echo "  Registration:  $(azd env get-value SERVICE_REGISTRATION_URI)"
      echo ""
      echo "Admin Authentication: Entra ID (Microsoft login)"
      echo "  App Registration: $(azd env get-value entraClientId)"
      echo ""
      echo "Proxy Managed Identity:"
      echo "  Principal ID: $(azd env get-value SERVICE_PROXY_IDENTITY_PRINCIPAL_ID)"
      echo ""
      echo "To grant access to your Azure OpenAI service:"
      echo ""
      echo "  az role assignment create \\"
      echo "    --assignee $(azd env get-value SERVICE_PROXY_IDENTITY_PRINCIPAL_ID) \\"
      echo "    --role \"Cognitive Services OpenAI User\" \\"
      echo "    --scope /subscriptions/<sub-id>/resourceGroups/<rg>/providers/Microsoft.CognitiveServices/accounts/<openai-name>"
      echo ""
      echo "Then add models via the admin UI with 'Use Managed Identity' enabled."
      echo ""
      echo "See QUICKSTART_MANAGED_IDENTITY.md for details"
      echo "============================================="
      echo ""
