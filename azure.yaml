# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

name: aoai-proxy
services:
  proxy:
    project: ./src/AzureAIProxy
    language: csharp
    host: containerapp
    docker:
      path: ../Dockerfile.proxy
      context: ../
      platform: amd64

  playground:
    project: ./src/playground
    language: ts
    host: staticwebapp
    dist: dist

hooks:
  preup:
    shell: sh
    continueOnError: false
    interactive: false
    run: ./infra/scripts/preup.sh
  postup:
    shell: sh
    continueOnError: true
    interactive: false
    run: |
      echo ""
      echo "============================================="
      echo "  Admin Login Credentials"
      echo "  Username: admin"
      echo "  Password: $(azd env get-value SERVICE_ADMIN_PASSWORD)"
      echo "  URL: $(azd env get-value SERVICE_PROXY_URI)"
      echo "============================================="
      echo ""
