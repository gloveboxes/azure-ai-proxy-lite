services:
  azurite:
    image: mcr.microsoft.com/azure-storage/azurite
    restart: unless-stopped
    ports:
      - "${AZURITE_TABLE_PORT:-10102}:10002"
    volumes:
      - azurite-data:/data
    command: azurite-table -l /data --tableHost 0.0.0.0
    healthcheck:
      test: ["CMD", "nc", "-z", "127.0.0.1", "10002"]
      interval: 10s
      timeout: 5s
      retries: 5

  proxy:
    image: ${PROXY_IMAGE:-glovebox/aoai-proxy:latest}
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c", "chown 1654:1654 /home/app/.aspnet/DataProtection-Keys && exec runuser -u app -- ./AzureAIProxy"]
    ports:
      - "${PROXY_PORT:-8900}:8080"
    volumes:
      - dataprotection-keys-proxy:/home/app/.aspnet/DataProtection-Keys
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__StorageAccount: >-
        DefaultEndpointsProtocol=http;
        AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
        TableEndpoint=http://azurite:10002/devstoreaccount1;
      EncryptionKey: "${ENCRYPTION_KEY:-change-this-encryption-key-in-production}"
      UseMockProxy: "${USE_MOCK_PROXY:-false}"
      ProxyUrl: "http://${REGISTRATION_HOST:-localhost}:${PROXY_PORT:-8900}/api/v1"
    depends_on:
      azurite:
        condition: service_healthy

  admin:
    image: ${ADMIN_IMAGE:-glovebox/aoai-proxy-admin:latest}
    restart: unless-stopped
    user: root
    entrypoint: ["/bin/sh", "-c", "chown 1654:1654 /home/app/.aspnet/DataProtection-Keys && exec runuser -u app -- ./AzureAIProxy.Admin"]
    ports:
      - "${ADMIN_PORT:-8901}:8080"
    volumes:
      - dataprotection-keys-admin:/home/app/.aspnet/DataProtection-Keys
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ASPNETCORE_ENVIRONMENT: "Development"
      ConnectionStrings__StorageAccount: >-
        DefaultEndpointsProtocol=http;
        AccountName=devstoreaccount1;
        AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OUzFT50uSRZ6IFsuFq2UVErCz4I6tq/K1SZFPTOtr/KBHBeksoGMGw==;
        TableEndpoint=http://azurite:10002/devstoreaccount1;
      EncryptionKey: "${ENCRYPTION_KEY:-change-this-encryption-key-in-production}"
      Admin__Users__0__Username: "${ADMIN_USERNAME:-admin}"
      Admin__Users__0__Password: "${ADMIN_PASSWORD:-admin}"
      Admin__Users__1__Username: "user1"
      Admin__Users__1__Password: "user"
      Admin__Users__2__Username: "user2"
      Admin__Users__2__Password: "user"
      Admin__Users__3__Username: "user3"
      Admin__Users__3__Password: "user"
      RegistrationUrl: "https://${REGISTRATION_HOST:-localhost}:${REGISTRATION_TLS_PORT:-4443}"
      ProxyInternalUrl: "http://proxy:8080"
    depends_on:
      azurite:
        condition: service_healthy
      proxy:
        condition: service_started

  registration:
    image: ${REGISTRATION_IMAGE:-glovebox/aoai-proxy-registration:latest}
    restart: unless-stopped
    ports:
      - "${REGISTRATION_PORT:-4280}:80"
      - "${REGISTRATION_TLS_PORT:-4443}:443"
    environment:
      PROXY_UPSTREAM: "http://proxy:8080"
      TLS_HOST: "${REGISTRATION_HOST:-localhost}"
    depends_on:
      - proxy

volumes:
  azurite-data:
  dataprotection-keys-proxy:
  dataprotection-keys-admin:
