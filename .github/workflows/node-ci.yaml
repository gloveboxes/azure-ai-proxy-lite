name: Registration CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: ["main", "feature/*"]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    defaults:
      run:
        working-directory: ./src/registration

    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 22.x
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
      - run: npm ci
      - run: npm run lint
      - run: npm run build --if-present
