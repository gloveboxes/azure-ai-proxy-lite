name: azd package

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: ["main", "feature/*"]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  package:
    runs-on: ubuntu-latest

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install azd
        uses: Azure/setup-azd@v2

      - name: Setup an azd env
        run: azd env new ci

      - name: Package with azd
        run: azd package
